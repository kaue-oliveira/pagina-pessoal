  <text x="140" y="388" fill="#c1b8ab" font-size="30" font-family="Manrope, Segoe UI, sans-serif">Backend, Java, Spring Boot e projetos em destaque.</text>

  <rect x="140" y="435" width="350" height="54" rx="27" fill="#6f9f81"/>
