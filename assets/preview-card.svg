  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#13191d"/>
      <stop offset="100%" stop-color="#1f2b31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#202a30"/>
      <stop offset="100%" stop-color="#172026"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="160" cy="100" r="160" fill="#6f9f81" opacity="0.08"/>
  <circle cx="1050" cy="0" r="220" fill="#8fbe9f" opacity="0.08"/>

